<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="config">
        <h1>Configurable Monopoly</h1>
        <div>
            <label>Players (comma separated):</label>
            <input id="players" type="text" placeholder="Alice,Bob" />
        </div>
        <div>
            <label>Font:</label>
            <select id="fontFamily" onchange="applyFont()">
                <option value="Arial">Arial</option>
                <option value="Courier New">Courier New</option>
                <option value="Times New Roman">Times New Roman</option>
            </select>
            <label>Size:</label>
            <input id="fontSize" type="number" value="16" onchange="applyFont()" style="width:60px"/>
        </div>
        <div>
            <h3>Board Definition (JSON)</h3>
            <textarea id="boardData" rows="10" cols="60"></textarea>
        </div>
        <div>
            <h3>Chance Cards (JSON)</h3>
            <textarea id="chanceData" rows="6" cols="60"></textarea>
        </div>
        <div>
            <h3>Community Chest Cards (JSON)</h3>
            <textarea id="communityData" rows="6" cols="60"></textarea>
        </div>
        <button onclick="startGame()">Start Game</button>
    </div>
    <div id="controls" style="display:none">
        <button onclick="takeTurn()">Next Turn</button>
    </div>
    <pre id="log"></pre>
    <script src="monopoly.js"></script>
    <script>
      // populate default data
      document.getElementById('boardData').value = JSON.stringify([
        {"name":"GO","type":"go"},
        {"name":"Mediterranean Ave","type":"property","price":60,"rent":2},
        {"name":"Community Chest","type":"community"},
        {"name":"Baltic Ave","type":"property","price":60,"rent":4},
        {"name":"Income Tax","type":"tax","price":200},
        {"name":"Reading Railroad","type":"property","price":200,"rent":25},
        {"name":"Oriental Ave","type":"property","price":100,"rent":6},
        {"name":"Chance","type":"chance"},
        {"name":"Vermont Ave","type":"property","price":100,"rent":6},
        {"name":"Jail","type":"jail"},
        {"name":"St. Charles Place","type":"property","price":140,"rent":10},
        {"name":"Electric Company","type":"property","price":150,"rent":10},
        {"name":"States Ave","type":"property","price":140,"rent":10},
        {"name":"Virginia Ave","type":"property","price":160,"rent":12},
        {"name":"Pennsylvania Railroad","type":"property","price":200,"rent":25},
        {"name":"St. James Place","type":"property","price":180,"rent":14},
        {"name":"Community Chest","type":"community"},
        {"name":"Tennessee Ave","type":"property","price":180,"rent":14},
        {"name":"New York Ave","type":"property","price":200,"rent":16},
        {"name":"Free Parking","type":"parking","action":{"money":200}},
        {"name":"Kentucky Ave","type":"property","price":220,"rent":18},
        {"name":"Chance","type":"chance"},
        {"name":"Indiana Ave","type":"property","price":220,"rent":18},
        {"name":"Illinois Ave","type":"property","price":240,"rent":20},
        {"name":"B&O Railroad","type":"property","price":200,"rent":25},
        {"name":"Atlantic Ave","type":"property","price":260,"rent":22},
        {"name":"Ventnor Ave","type":"property","price":260,"rent":22},
        {"name":"Water Works","type":"property","price":150,"rent":10},
        {"name":"Marvin Gardens","type":"property","price":280,"rent":24},
        {"name":"Go To Jail","type":"gotojail","action":{"gotoJail":true}},
        {"name":"Pacific Ave","type":"property","price":300,"rent":26},
        {"name":"North Carolina Ave","type":"property","price":300,"rent":26},
        {"name":"Community Chest","type":"community"},
        {"name":"Pennsylvania Ave","type":"property","price":320,"rent":28},
        {"name":"Short Line","type":"property","price":200,"rent":25},
        {"name":"Chance","type":"chance"},
        {"name":"Park Place","type":"property","price":350,"rent":35},
        {"name":"Luxury Tax","type":"tax","price":100},
        {"name":"Boardwalk","type":"property","price":400,"rent":50}
      ], null, 2);
      document.getElementById('chanceData').value = JSON.stringify([
        {"text":"Advance to Go","action":null},
        {"text":"Bank pays you dividend of $50","action":function(game,player){player.money+=50;}},
        {"text":"Go to Jail","action":function(game,player){player.position=10;player.inJail=true;player.jailTurns=3;}}
      ], null, 2);
      document.getElementById('communityData').value = JSON.stringify([
        {"text":"Doctor's fees – Pay $50","action":function(game,player){player.money-=50;}},
        {"text":"From sale of stock you get $50","action":function(game,player){player.money+=50;}},
        {"text":"Go to Jail","action":function(game,player){player.position=10;player.inJail=true;player.jailTurns=3;}}
      ], null, 2);
      function applyFont() {
        const family = document.getElementById('fontFamily').value;
        const size = document.getElementById('fontSize').value;
        document.body.style.fontFamily = family;
        document.body.style.fontSize = size + 'px';
      }
      applyFont();
    </script>
</body>
</html>
