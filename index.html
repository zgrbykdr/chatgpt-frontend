<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D&D 3E DM Desktop Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>D&D 3E DM Desktop Manager</h1>
      <div class="toolbar">
        <button id="newCampaignBtn">New Campaign</button>
        <button id="loadCampaignBtn">Load</button>
        <button id="saveCampaignBtn">Save</button>
        <button id="saveAsCampaignBtn">Save As</button>
        <button id="exportCharsBtn">Export Characters</button>
        <button id="importFeatTxtBtn">Import Feats TXT</button>
        <button id="importFeatMappingBtn">Import Feat Mechanics JSON</button>
      </div>
    </header>

    <div class="layout">
      <aside>
        <div class="aside-controls">
          <input id="charSearch" placeholder="Search characters..." />
          <button id="addCharacterBtn">+ Character</button>
        </div>
        <ul id="characterList"></ul>
      </aside>

      <main>
        <section id="overviewPanel" class="panel">
          <h2>Overview</h2>
          <div class="grid">
            <label>Name <input id="charName" /></label>
            <label>Player <input id="charPlayer" /></label>
            <label>Type
              <select id="charType"><option>PC</option><option>NPC</option></select>
            </label>
            <label>Race <input id="charRace" /></label>
            <label>HP Max <input id="hpMax" type="number" /></label>
            <label>HP Current <input id="hpCurrent" type="number" /></label>
            <label>Temp HP <input id="hpTemp" type="number" /></label>
            <label>Nonlethal <input id="hpNonlethal" type="number" /></label>
            <label>AC Armor <input id="acArmor" type="number" /></label>
            <label>AC Shield <input id="acShield" type="number" /></label>
            <label>AC Natural <input id="acNatural" type="number" /></label>
            <label>Initiative Misc <input id="initMisc" type="number" /></label>
          </div>
          <div class="quick-actions">
            <input id="hpDelta" type="number" value="1" />
            <button id="applyDamageBtn">Apply Damage</button>
            <button id="applyHealBtn">Apply Heal</button>
            <button id="undoHpBtn">Undo HP</button>
            <button id="fatiguedBtn">Apply Fatigued (10 rounds)</button>
          </div>
          <div id="derivedLine"></div>
        </section>

        <section id="featsPanel" class="panel">
          <h2>Feats & Features</h2>
          <div class="split">
            <div>
              <h3>Feat Library</h3>
              <input id="featSearch" placeholder="Search feats..." />
              <ul id="featList"></ul>
            </div>
            <div>
              <h3>Selected Feats</h3>
              <ul id="selectedFeats"></ul>
              <h3>Feat Rules Mapper</h3>
              <select id="mapperFeatSelect"></select>
              <label>Target <input id="mapTarget" placeholder="initiative" /></label>
              <label>Value <input id="mapValue" type="number" value="0" /></label>
              <label>Bonus Type <input id="mapType" placeholder="competence" /></label>
              <button id="saveMappingBtn">Save Mapping to Private Pack</button>
            </div>
          </div>
        </section>

        <section id="effectsPanel" class="panel">
          <h2>Effects/Conditions</h2>
          <button id="endRoundBtn">End Round (decrement durations)</button>
          <ul id="effectsList"></ul>
        </section>

        <section id="combatPanel" class="panel">
          <h2>Combat Dashboard</h2>
          <table>
            <thead><tr><th>Name</th><th>Init</th><th>HP</th><th>AC</th><th>Saves</th><th>Conditions</th><th>Actions</th></tr></thead>
            <tbody id="combatRows"></tbody>
          </table>
        </section>

        <section id="notesPanel" class="panel">
          <h2>Notes</h2>
          <label>Character Notes <textarea id="charNotes"></textarea></label>
          <label>Session Notes <textarea id="charSessionNotes"></textarea></label>
          <label>Campaign Global Notes <textarea id="campaignGlobalNotes"></textarea></label>
        </section>
      </main>
    </div>

    <script src="src/renderer.js"></script>
  </body>
</html>
